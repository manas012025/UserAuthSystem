name: Docker Build -> pull -> deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin' # See 'Supported distributions' for available options
        java-version: '17'

    - name: Build jar
      run: ./mvnw clean package -DskipTests

    - name: Login DockerHub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/userauthsystem:latest

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/userauthsystem:latest
      
    - name: SSH and deploy to ec2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_KEY }}
        script: |
           docker stop userauthsystem || true
           docker rm userauthsystem || true
           docker pull ${{ secrets.DOCKERHUB_USERNAME }}/userauthsystem:latest
           docker run -d --name userauthsystem -p  8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/userauthsystem:latest
